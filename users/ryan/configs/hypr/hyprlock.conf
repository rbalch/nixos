background {
    monitor =
    path = ~/Pictures/backgrounds/earth.jpg
    blur_passes = 4
    blur_size = 10
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
}

# translucent dark panel behind clock + input
shape {
    monitor =
    size = 420, 380
    color = rgba(0, 0, 0, 0.55)
    rounding = 20
    position = 0, 0
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.6)
}

# time
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.95)
    font_size = 86
    font_family = MesloLGS Nerd Font
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.7)
}

# date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = MesloLGS Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# greeting
label {
    monitor =
    text = hey, $USER
    color = rgba(255, 255, 255, 0.5)
    font_size = 14
    font_family = MesloLGS Nerd Font
    position = 0, -30
    halign = center
    valign = center
}

# password input
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.15)
    inner_color = rgba(255, 255, 255, 0.08)
    font_color = rgba(255, 255, 255, 0.9)
    font_family = MesloLGS Nerd Font
    fade_on_empty = true
    fade_timeout = 3000
    placeholder_text = <i>password</i>
    rounding = 12
    check_color = rgba(100, 220, 160, 0.8)
    fail_color = rgba(220, 80, 80, 0.8)
    fail_text = <i>$FAIL</i>
    position = 0, -90
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
}
