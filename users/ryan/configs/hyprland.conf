monitor=DP-1,7680x2160@120,0x0,1.25
monitor=,preferred,auto,auto

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once=awww-daemon && awww img /home/ryan/Pictures/backgrounds/earth.jpg
exec-once=hyprctl setcursor GoogleDot-Blue 28
exec-once=[workspace 1 silent] code
exec-once=[workspace 1 silent] google-chrome-stable

# audio
binde =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
binde =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# video
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+

xwayland {
    force_zero_scaling = true
}

env = XCURSOR_SIZE,30

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

# 3-finger swipe to switch workspaces
bind = , swipe:3:r, workspace, e-1
bind = , swipe:3:l, workspace, e+1

$mainMod = SUPER

bind = $mainMod, Q, killactive,
bind = $mainMod, W, killactive,
bind = $mainMod, T, exec, ghostty
bind = $mainMod, M, exec, loginctl lock-session && sleep 0.5 && hyprctl dispatch dpms off
bind = $mainMod, E, exec, nautilus
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod, SPACE, exec, wofi --normal-window --show drun
bind = $mainMod, F, fullscreen,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30

# window snapping
bind = $mainMod, bracketright, exec, ~/.config/hypr/snap-right.sh

# sleep and screenshot
exec-once = hypridle
bind = SUPER, L, exec, loginctl lock-session
bind = SUPER SHIFT, N, exec, loginctl lock-session && sleep 0.5 && systemctl suspend

# chrome fullscreen fix: suppress chrome's own fullscreen/maximize events so
# hyprland manages window state instead of chrome. escape in fullscreen no
# longer nukes the window geometry.
windowrule = suppress_event fullscreen maximize class:^(google-chrome)$

# vscode fix
env = NIXOS_OZONE_WL,1

# dark mode
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark